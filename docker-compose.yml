services:
  db:
    image: postgres:16-alpine
    container_name: coursesphere_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coursesphere
      POSTGRES_PASSWORD: coursesphere
      POSTGRES_DB: coursesphere_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
